server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # real-time feed (WebSocket) -> gateway
  location /ws {
    proxy_pass http://spectra-gateway.spectra.svc:8090;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }

  # history queries + mode control -> gateway
  location /api/ {
    proxy_pass http://spectra-gateway.spectra.svc:8090;
    proxy_set_header Host $host;
  }

  # FM live audio -> edge agent audio stream
  location /audio/ {
    proxy_pass http://spectra-agent-audio.spectra-edge.svc:8000/;
    proxy_buffering off;
    proxy_read_timeout 3600s;
  }
}

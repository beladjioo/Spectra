# Serves the survey UI over HTTP (80) and HTTPS (443, self-signed). HTTPS is
# required so the browser geolocation (GPS) works over the LAN — use a phone for
# precise GPS. nginx also reverse-proxies the gateway WS/API and the audio stream.

map $http_upgrade $connection_upgrade { default upgrade; "" close; }

server {
  listen 80;
  listen 443 ssl;
  http2 on;
  ssl_certificate     /etc/nginx/certs/tls.crt;
  ssl_certificate_key /etc/nginx/certs/tls.key;

  root /usr/share/nginx/html;
  index index.html;

  location / { try_files $uri $uri/ /index.html; }

  location /ws {
    proxy_pass http://spectra-gateway.spectra.svc:8090;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }
  location /api/ {
    proxy_pass http://spectra-gateway.spectra.svc:8090;
    proxy_set_header Host $host;
  }
  location /audio/ {
    proxy_pass http://spectra-agent-audio.spectra-edge.svc:8000/;
    proxy_buffering off;
    proxy_read_timeout 3600s;
  }
}

# RF Academy runs on every node labelled with a HackRF. One container = the Rust
# backend (tunable SDR DSP + WebSocket) serving the baked-in React UI. The radio
# is receive-only. No MQTT, no separate gateway/web — it's all one binary.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: rf-academy
  namespace: rf-academy
  labels:
    app.kubernetes.io/name: rf-academy
    app.kubernetes.io/part-of: rf-academy
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: rf-academy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rf-academy
    spec:
      # Label your SDR node: kubectl label node <node> spectra.io/hackrf=true
      nodeSelector:
        spectra.io/hackrf: "true"
      containers:
        - name: rf-academy
          image: ghcr.io/beladjioo/rf-academy:sha-6e018c1
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true # raw USB access to the HackRF
          ports:
            - { name: http, containerPort: 8090 }
          envFrom:
            - configMapRef:
                name: rf-academy-config
          readinessProbe:
            httpGet: { path: /healthz, port: 8090 }
            initialDelaySeconds: 5
          volumeMounts:
            - name: usb
              mountPath: /dev/bus/usb
          resources:
            requests: { cpu: 500m, memory: 128Mi }
            limits: { cpu: "2", memory: 384Mi }
      volumes:
        - name: usb
          hostPath:
            path: /dev/bus/usb

apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegraf
  labels:
    app.kubernetes.io/name: telegraf
    app.kubernetes.io/part-of: spectra
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: telegraf
  template:
    metadata:
      labels:
        app.kubernetes.io/name: telegraf
      annotations:
        # roll the pod when the config changes
        checksum/config: telegraf-config-v1
    spec:
      containers:
        - name: telegraf
          image: telegraf:1.32-alpine
          args: ["--config", "/etc/telegraf/telegraf.conf"]
          volumeMounts:
            - name: config
              mountPath: /etc/telegraf/telegraf.conf
              subPath: telegraf.conf
              readOnly: true
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 768Mi }
      volumes:
        - name: config
          configMap:
            name: telegraf-config

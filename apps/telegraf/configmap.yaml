apiVersion: v1
kind: ConfigMap
metadata:
  name: telegraf-config
data:
  telegraf.conf: |
    [agent]
      interval = "10s"
      flush_interval = "10s"
      omit_hostname = true
      debug = true

    [[outputs.influxdb]]
      urls = ["http://vmsingle-victoria-metrics-single-server.spectra.svc:8428"]
      database = "spectra"

    [[inputs.mqtt_consumer]]
      servers = ["tcp://mosquitto.spectra.svc:1883"]
      topics = ["spectra/+/sweep"]
      data_format = "json_v2"

      # Block 1: scalar summary metrics -> rf_sweep_*
      # No timestamp_path: Telegraf stamps at ingestion time (robust; the message
      # "ts" field caused frozen/old timestamps).
      [[inputs.mqtt_consumer.json_v2]]
        measurement_name = "rf_sweep"
        [[inputs.mqtt_consumer.json_v2.tag]]
          path = "sensor_id"
        [[inputs.mqtt_consumer.json_v2.field]]
          path = "noise_floor_db"
        [[inputs.mqtt_consumer.json_v2.field]]
          path = "peak_db"
        [[inputs.mqtt_consumer.json_v2.field]]
          path = "occupancy_ratio"
        [[inputs.mqtt_consumer.json_v2.field]]
          path = "interference"
          type = "bool"

      # Block 2: per-frequency-bin power -> rf_spectrum_power_db{freq_mhz}
      [[inputs.mqtt_consumer.json_v2]]
        measurement_name = "rf_spectrum"
        [[inputs.mqtt_consumer.json_v2.tag]]
          path = "sensor_id"
        [[inputs.mqtt_consumer.json_v2.object]]
          path = "bins"
          tags = ["freq_mhz"]

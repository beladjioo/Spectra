apiVersion: v1
kind: ConfigMap
metadata:
  name: telegraf-config
data:
  telegraf.conf: |
    [agent]
      interval = "2s"
      flush_interval = "2s"
      omit_hostname = true

    [[outputs.influxdb]]
      urls = ["http://vmsingle-victoria-metrics-single-server.spectra.svc:8428"]
      database = "spectra"

    # Two SEPARATE mqtt_consumer inputs (each its own client_id + single json_v2)
    # so the parsers don't interfere — a second json_v2 block in one input silently
    # killed the first block's output.

    # Input A: scalar summary -> rf_sweep_{noise_floor_db,peak_db,occupancy_ratio,interference}
    [[inputs.mqtt_consumer]]
      servers = ["tcp://mosquitto.spectra.svc:1883"]
      client_id = "telegraf-rf-sweep"
      topics = ["spectra/+/sweep"]
      data_format = "json_v2"
      [[inputs.mqtt_consumer.json_v2]]
        measurement_name = "rf_sweep"
        [[inputs.mqtt_consumer.json_v2.tag]]
          path = "sensor_id"
        [[inputs.mqtt_consumer.json_v2.field]]
          path = "noise_floor_db"
        [[inputs.mqtt_consumer.json_v2.field]]
          path = "peak_db"
        [[inputs.mqtt_consumer.json_v2.field]]
          path = "occupancy_ratio"
        [[inputs.mqtt_consumer.json_v2.field]]
          path = "interference"
          type = "bool"

    # Input B: per-frequency-bin power -> rf_spectrum_power_db{freq_mhz}
    [[inputs.mqtt_consumer]]
      servers = ["tcp://mosquitto.spectra.svc:1883"]
      client_id = "telegraf-rf-spectrum"
      topics = ["spectra/+/sweep"]
      data_format = "json_v2"
      [[inputs.mqtt_consumer.json_v2]]
        measurement_name = "rf_spectrum"
        [[inputs.mqtt_consumer.json_v2.tag]]
          path = "sensor_id"
        [[inputs.mqtt_consumer.json_v2.object]]
          path = "bins"
          tags = ["freq_mhz"]

    # Input C: live agent status -> spectra_status_center_mhz{sensor_id}
    # Single series per sensor (value = current band centre) so the UI always
    # shows the CURRENT mode. Value-mapped to a label in Grafana.
    [[inputs.mqtt_consumer]]
      servers = ["tcp://mosquitto.spectra.svc:1883"]
      client_id = "telegraf-status"
      topics = ["spectra/+/status"]
      data_format = "json_v2"
      [[inputs.mqtt_consumer.json_v2]]
        measurement_name = "spectra_status"
        [[inputs.mqtt_consumer.json_v2.tag]]
          path = "sensor_id"
        [[inputs.mqtt_consumer.json_v2.field]]
          path = "center_mhz"
        [[inputs.mqtt_consumer.json_v2.field]]
          path = "active"

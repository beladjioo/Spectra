apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
data:
  # Minimal monolithic Loki (filesystem storage) for a homelab. Stores the stream
  # of decoded RF objects (rtl_433 devices, future ADS-B...) as logs.
  loki.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
      log_level: warn
    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      retention_period: 168h          # 7 days
      allow_structured_metadata: true
      volume_enabled: true
    compactor:
      working_directory: /loki/compactor
      retention_enabled: true
      delete_request_store: filesystem
    analytics:
      reporting_enabled: false

apiVersion: v1
kind: ConfigMap
metadata:
  name: spectra-control
data:
  # Tiny HTTP -> MQTT bridge. The Grafana mode buttons call this; it publishes the
  # desired mode as a RETAINED message on spectra/<sensor>/mode, which the edge
  # agent obeys. CORS is wide open (homelab, LAN only).
  control.py: |
    import json, os
    from http.server import BaseHTTPRequestHandler, HTTPServer
    from urllib.parse import urlparse, parse_qs
    import paho.mqtt.client as mqtt

    HOST = os.environ.get("MQTT_HOST", "mosquitto.spectra.svc")
    PORT = int(os.environ.get("MQTT_PORT", "1883"))
    PREFIX = os.environ.get("TOPIC_PREFIX", "spectra")

    cli = mqtt.Client(client_id="spectra-control")
    cli.connect(HOST, PORT, 60)
    cli.loop_start()

    class H(BaseHTTPRequestHandler):
        def _cors(self):
            self.send_header("Access-Control-Allow-Origin", "*")
            self.send_header("Access-Control-Allow-Methods", "GET,POST,OPTIONS")
            self.send_header("Access-Control-Allow-Headers", "Content-Type")
        def do_OPTIONS(self):
            self.send_response(204); self._cors(); self.end_headers()
        def do_GET(self): self._handle()
        def do_POST(self): self._handle()
        def _handle(self):
            q = parse_qs(urlparse(self.path).query)
            sensor = q.get("sensor", ["jetson-desktop"])[0]
            mode = q.get("mode", [""])[0]
            if not mode and self.command == "POST":
                n = int(self.headers.get("Content-Length", 0) or 0)
                if n:
                    try:
                        b = json.loads(self.rfile.read(n))
                        sensor = b.get("sensor", sensor); mode = b.get("mode", mode)
                    except Exception:
                        pass
            if not mode:
                self.send_response(400); self._cors(); self.end_headers()
                self.wfile.write(b'{"error":"mode required"}'); return
            topic = f"{PREFIX}/{sensor}/mode"
            cli.publish(topic, mode, qos=1, retain=True)
            self.send_response(200)
            self.send_header("Content-Type", "application/json"); self._cors(); self.end_headers()
            self.wfile.write(json.dumps({"ok": True, "sensor": sensor, "mode": mode}).encode())
        def log_message(self, *a): pass

    print("spectra-control on :8080 ->", HOST, PORT, flush=True)
    HTTPServer(("0.0.0.0", 8080), H).serve_forever()

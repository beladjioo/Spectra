apiVersion: v1
kind: Service
metadata:
  name: spectra-control
  labels:
    app.kubernetes.io/name: spectra-control
spec:
  # NodePort so the Grafana mode buttons (running in your browser on the LAN) can
  # reach it at http://<node-ip>:30890/?sensor=<id>&mode=<mode>
  type: NodePort
  selector:
    app.kubernetes.io/name: spectra-control
  ports:
    - { name: http, port: 8080, targetPort: 8080, nodePort: 30890 }

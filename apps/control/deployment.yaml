apiVersion: apps/v1
kind: Deployment
metadata:
  name: spectra-control
  labels:
    app.kubernetes.io/name: spectra-control
    app.kubernetes.io/part-of: spectra
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spectra-control
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spectra-control
    spec:
      containers:
        - name: control
          image: python:3.12-slim
          command: ["/bin/sh", "-c"]
          args:
            - pip install --quiet --root-user-action=ignore paho-mqtt && exec python /app/control.py
          env:
            - { name: MQTT_HOST, value: "mosquitto.spectra.svc" }
            - { name: MQTT_PORT, value: "1883" }
          ports:
            - { name: http, containerPort: 8080 }
          volumeMounts:
            - { name: script, mountPath: /app }
          resources:
            requests: { cpu: 25m, memory: 48Mi }
            limits: { cpu: 100m, memory: 96Mi }
      volumes:
        - name: script
          configMap: { name: spectra-control }

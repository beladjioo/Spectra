apiVersion: v1
kind: ConfigMap
metadata:
  name: spectra-simulator
data:
  # Demo/dev only: fabricates realistic ISM sweep telemetry so the whole pipeline
  # (MQTT -> Telegraf -> VictoriaMetrics -> Grafana -> vmalert) can be demonstrated
  # without a HackRF. Delete this app once real edge sensors are publishing.
  simulate.py: |
    import json, os, random, time, math
    import paho.mqtt.client as mqtt

    HOST = os.environ.get("SIM_MQTT_HOST", "mosquitto.spectra.svc")
    PORT = int(os.environ.get("SIM_MQTT_PORT", "1883"))
    PREFIX = os.environ.get("SIM_TOPIC_PREFIX", "spectra")
    SENSORS = os.environ.get("SIM_SENSORS", "paris-13-rooftop,paris-11-relay,lyon-quai").split(",")
    INTERVAL = float(os.environ.get("SIM_INTERVAL", "5"))
    THRESHOLD = float(os.environ.get("SIM_THRESHOLD", "-65"))
    BAND = [863, 870]

    # Per-sensor state: quiet baseline noise floor + an interference-episode countdown.
    state = {s: {"baseline": random.uniform(-80, -74), "episode": 0} for s in SENSORS}

    cli = mqtt.Client(client_id="spectra-simulator")
    while True:
        try:
            cli.connect(HOST, PORT, keepalive=60)
            break
        except Exception as e:
            print("waiting for mqtt:", e, flush=True); time.sleep(3)
    cli.loop_start()
    print(f"simulator publishing for {SENSORS} -> {HOST}:{PORT}", flush=True)

    while True:
        for s in SENSORS:
            st = state[s]
            # randomly start an interference episode (lasts ~70 cycles so the
            # 5-min vmalert "ISMInterferenceSustained" can fire on one sensor)
            if st["episode"] == 0 and random.random() < 0.02:
                st["episode"] = random.randint(70, 110)
            interfering = st["episode"] > 0
            if interfering:
                st["episode"] -= 1

            base = st["baseline"]
            if interfering:
                noise_floor = base + random.uniform(14, 22)   # noise floor climbs past threshold
            else:
                noise_floor = base + random.uniform(-1.5, 2.5)
            peak = noise_floor + random.uniform(8, 25)
            occupancy = min(1.0, max(0.0,
                (0.5 if interfering else 0.12) + random.uniform(-0.05, 0.15)))

            # a few coarse bins for realism / future waterfall (not ingested today)
            bins = []
            f = BAND[0]
            while f < BAND[1]:
                p = noise_floor + random.uniform(0, 6)
                if interfering and random.random() < 0.3:
                    p += random.uniform(5, 15)
                bins.append({"freq_mhz": round(f, 3), "power_db": round(p, 2)})
                f += 0.5

            payload = {
                "sensor_id": s,
                "ts": time.time(),
                "band_mhz": BAND,
                "noise_floor_db": round(noise_floor, 2),
                "peak_db": round(peak, 2),
                "occupancy_ratio": round(occupancy, 4),
                "interference": noise_floor > THRESHOLD,
                "bins": bins,
            }
            cli.publish(f"{PREFIX}/{s}/sweep", json.dumps(payload), qos=0)
        time.sleep(INTERVAL)

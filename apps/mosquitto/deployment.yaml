apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  labels:
    app.kubernetes.io/name: mosquitto
    app.kubernetes.io/part-of: spectra
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mosquitto
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mosquitto
    spec:
      containers:
        - name: mosquitto
          image: eclipse-mosquitto:2.0
          ports:
            - { name: mqtt, containerPort: 1883 }
            - { name: mqtt-tls, containerPort: 8883 }
          volumeMounts:
            - { name: config, mountPath: /mosquitto/config/mosquitto.conf, subPath: mosquitto.conf }
            - { name: data, mountPath: /mosquitto/data }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 250m, memory: 128Mi }
      volumes:
        - name: config
          configMap: { name: mosquitto-config }
        - name: data
          emptyDir: {}   # swap for a PVC if you need durable retained messages

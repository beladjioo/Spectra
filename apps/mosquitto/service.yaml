apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  labels:
    app.kubernetes.io/name: mosquitto
spec:
  selector:
    app.kubernetes.io/name: mosquitto
  ports:
    - { name: mqtt, port: 1883, targetPort: 1883 }
    - { name: mqtt-tls, port: 8883, targetPort: 8883 }
  # For edge sensors to reach this, expose 8883 via LoadBalancer/NodePort or an
  # Ingress with TLS passthrough. Keep 1883 cluster-internal only.
  type: ClusterIP

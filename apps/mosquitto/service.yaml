apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  labels:
    app.kubernetes.io/name: mosquitto
spec:
  selector:
    app.kubernetes.io/name: mosquitto
  ports:
    # Exposed on every node at :31883 so edge agents (HackRF on the Jetson) can
    # publish over the LAN. Plaintext is fine for a homelab; switch to the TLS
    # 8883 listener + a NodePort/LoadBalancer before exposing beyond the LAN.
    - { name: mqtt, port: 1883, targetPort: 1883, nodePort: 31883 }
  type: NodePort

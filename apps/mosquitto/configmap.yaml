apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
data:
  mosquitto.conf: |
    persistence true
    persistence_location /mosquitto/data/

    # Internal plaintext listener for in-cluster clients (Telegraf).
    listener 1883
    allow_anonymous true

    # External TLS listener for edge sensors. Wire real certs + a password file
    # via a Secret before exposing this beyond the homelab LAN.
    # listener 8883
    # cafile   /mosquitto/certs/ca.crt
    # certfile /mosquitto/certs/server.crt
    # keyfile  /mosquitto/certs/server.key
    # password_file /mosquitto/auth/passwords
    # allow_anonymous false

    log_dest stdout
    log_type warning
    log_type notice

apiVersion: apps/v1
kind: Deployment
metadata:
  name: spectra-devices-bridge
  labels:
    app.kubernetes.io/name: spectra-devices-bridge
    app.kubernetes.io/part-of: spectra
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spectra-devices-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spectra-devices-bridge
    spec:
      containers:
        - name: bridge
          image: python:3.12-slim
          command: ["/bin/sh", "-c"]
          args:
            - pip install --quiet --root-user-action=ignore paho-mqtt && exec python /app/bridge.py
          env:
            - { name: MQTT_HOST, value: "mosquitto.spectra.svc" }
            - { name: LOKI_URL, value: "http://loki.spectra.svc:3100" }
          volumeMounts:
            - { name: script, mountPath: /app }
          resources:
            requests: { cpu: 25m, memory: 48Mi }
            limits: { cpu: 100m, memory: 96Mi }
      volumes:
        - name: script
          configMap: { name: spectra-devices-bridge }

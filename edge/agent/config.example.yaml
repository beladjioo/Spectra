# Spectra edge agent — example config.
# Copy to config.yaml and adjust. Secrets (mqtt_username/password) are better
# injected via env (SPECTRA_MQTT_USERNAME / SPECTRA_MQTT_PASSWORD) from a k8s Secret.

sensor_id: paris-13-rooftop-01

mqtt_host: mqtt.spectra.example.com
mqtt_port: 8883
mqtt_tls: true
topic_prefix: spectra

# --- hackrf_sweep: ISM band occupancy & noise floor ---
# EU 868 MHz SRD band by default. For US, use 902:928.
sweep_freq_min_mhz: 863
sweep_freq_max_mhz: 870
sweep_bin_width_hz: 100000
sweep_lna_gain: 32          # 0..40 dB, step 8
sweep_vga_gain: 20          # 0..62 dB, step 2
sweep_interval_s: 5.0

# --- rtl_433: decode active IoT/SRD devices ---
rtl433_enabled: true
rtl433_device: "soapy:driver=hackrf"
rtl433_frequency: "868.3M"
rtl433_sample_rate: "1024k"

# --- interference detection ---
# Noise floor above this (dB, relative to hackrf_sweep scale) flags interference.
# Calibrate this against a known-quiet baseline at your site before alerting on it.
noise_floor_dbm_threshold: -65.0

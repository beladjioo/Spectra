# Runs the Spectra agent on every edge node that has a HackRF.
# Node selector keeps it off nodes without the radio.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: spectra-agent
  namespace: spectra-edge
  labels:
    app.kubernetes.io/name: spectra-agent
    app.kubernetes.io/part-of: spectra
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: spectra-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spectra-agent
    spec:
      nodeSelector:
        spectra.io/hackrf: "true"   # label your sensor node: kubectl label node <n> spectra.io/hackrf=true
      hostNetwork: false
      containers:
        - name: agent
          image: ghcr.io/CHANGEME/spectra-edge-agent:latest   # TODO: set your registry
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true   # required for raw USB access to the HackRF
          env:
            - name: SPECTRA_SENSOR_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SPECTRA_MQTT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: spectra-mqtt-creds
                  key: username
            - name: SPECTRA_MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spectra-mqtt-creds
                  key: password
          volumeMounts:
            - name: usb
              mountPath: /dev/bus/usb
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 256Mi
      volumes:
        - name: usb
          hostPath:
            path: /dev/bus/usb
        - name: config
          configMap:
            name: spectra-agent-config

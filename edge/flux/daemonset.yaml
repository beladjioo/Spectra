# Runs the Spectra agent on every node labelled with a HackRF.
# It runs *inside* the cluster, so it reaches Mosquitto directly via the ClusterIP
# service (plaintext, in-cluster) — no NodePort/TLS/secret needed here.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: spectra-agent
  namespace: spectra-edge
  labels:
    app.kubernetes.io/name: spectra-agent
    app.kubernetes.io/part-of: spectra
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: spectra-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spectra-agent
    spec:
      # Label your sensor node: kubectl label node jetson-desktop spectra.io/hackrf=true
      nodeSelector:
        spectra.io/hackrf: "true"
      containers:
        - name: agent
          image: ghcr.io/beladjioo/spectra-edge-agent:latest
          imagePullPolicy: Always
          securityContext:
            privileged: true   # raw USB access to the HackRF
          ports:
            - { name: audio, containerPort: 8000 }   # FM live-audio MP3 stream
          env:
            - name: SPECTRA_SENSOR_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: usb
              mountPath: /dev/bus/usb
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          resources:
            requests: { cpu: 250m, memory: 128Mi }
            limits: { cpu: "1", memory: 256Mi }
      volumes:
        - name: usb
          hostPath:
            path: /dev/bus/usb
        - name: config
          configMap:
            name: spectra-agent-config

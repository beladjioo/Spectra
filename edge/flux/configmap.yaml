apiVersion: v1
kind: ConfigMap
metadata:
  name: spectra-agent-config
  namespace: spectra-edge
data:
  config.yaml: |
    # sensor_id is overridden by SPECTRA_SENSOR_ID (the node name) in the DaemonSet.
    # In-cluster: reach Mosquitto via its ClusterIP service, plaintext.
    mqtt_host: mosquitto.spectra.svc
    mqtt_port: 1883
    mqtt_tls: false
    topic_prefix: spectra

    sweep_freq_min_mhz: 863
    sweep_freq_max_mhz: 870
    sweep_bin_width_hz: 100000
    sweep_lna_gain: 32
    sweep_vga_gain: 20
    sweep_interval_s: 5.0

    # A single HackRF can't run hackrf_sweep and rtl_433 at the same time.
    # Keep decode off until we time-share the device or add a second SDR.
    rtl433_enabled: false

    noise_floor_dbm_threshold: -65.0

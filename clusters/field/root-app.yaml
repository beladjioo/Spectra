# App-of-apps for the FIELD cluster (laptop k3s, e.g. in WSL). Deploys only the
# lean survey stack — same Git repo, same images as home, fewer components.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spectra-field-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/beladjioo/Spectra.git
    targetRevision: main
    path: clusters/field/apps
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]

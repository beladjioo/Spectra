# App-of-apps root. ArgoCD watches clusters/homelab/apps/ and reconciles every
# child Application found there. Apply this once (make root-app) and from then on
# adding a component = committing a new Application manifest.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spectra-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/CHANGEME/spectra.git   # TODO: your repo URL
    targetRevision: main
    path: clusters/homelab/apps
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

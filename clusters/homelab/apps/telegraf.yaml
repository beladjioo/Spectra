# Ingest: subscribe to MQTT, parse the agent's JSON, write to VictoriaMetrics via
# the InfluxDB line protocol. Deployed from local kustomize (apps/telegraf) with a
# raw-TOML config — the Helm chart's map->TOML rendering reordered keys and broke
# the mqtt_consumer input, so we own the config explicitly.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: telegraf
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/beladjioo/Spectra.git
    targetRevision: main
    path: apps/telegraf
  destination:
    server: https://kubernetes.default.svc
    namespace: spectra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

# spectra-gateway — MQTT->WebSocket + REST proxy for the web frontend.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/beladjioo/Spectra.git
    targetRevision: main
    path: apps/gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: spectra
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]

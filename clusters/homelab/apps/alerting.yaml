# Interference alert rules (vmalert) — the product's "why did my sensor go silent?"
# signal. Rules live in git under apps/alerting.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alerting
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/beladjioo/Spectra.git   # TODO: your repo URL
    targetRevision: main
    path: apps/alerting
  destination:
    server: https://kubernetes.default.svc
    namespace: spectra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

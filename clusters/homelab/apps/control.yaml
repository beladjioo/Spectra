# spectra-control: HTTP -> MQTT bridge so the Grafana mode buttons can retune the
# HackRF (publishes the desired mode on spectra/<sensor>/mode).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: control
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/beladjioo/Spectra.git
    targetRevision: main
    path: apps/control
  destination:
    server: https://kubernetes.default.svc
    namespace: spectra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

# Provisions the ConfigMap Grafana reads dashboards from (referenced by grafana.yaml).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-dashboards
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CHANGEME/spectra.git   # TODO: your repo URL
    targetRevision: main
    path: apps/grafana
  destination:
    server: https://kubernetes.default.svc
    namespace: spectra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

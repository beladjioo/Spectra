# Time-series store. Single-node is plenty for a homelab; swap to the cluster
# chart when you scale. vmalert + alertmanager are enabled for interference alerts.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoriametrics
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://victoriametrics.github.io/helm-charts/
    chart: victoria-metrics-single
    targetRevision: 0.13.*
    helm:
      releaseName: vmsingle
      values: |
        server:
          retentionPeriod: 14d   # short retention — homelab, limited storage
          persistentVolume:
            enabled: true
            size: 20Gi   # nominal only; local-path uses real data, not the limit
          scrape:
            enabled: false     # data is pushed by Telegraf, not scraped
  destination:
    server: https://kubernetes.default.svc
    namespace: spectra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

# DEMO ONLY: fabricates ISM sweep telemetry so the pipeline can be shown without a
# HackRF. Disable/delete this Application once real edge sensors publish.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: simulator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/beladjioo/Spectra.git
    targetRevision: main
    path: apps/simulator
  destination:
    server: https://kubernetes.default.svc
    namespace: spectra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

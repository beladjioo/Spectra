apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: { name: rf-academy, namespace: argocd }
spec:
  project: default
  source:
    repoURL: "https://github.com/beladjioo/Spectra.git"
    targetRevision: main
    path: apps/rf-academy
  destination: { server: "https://kubernetes.default.svc", namespace: rf-academy }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
